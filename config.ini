# AprilTagVMC Konfiguration
# Zeilen, die mit # beginnen, sind Kommentare.
# Inline-Kommentare (Wert  # Kommentar) werden ebenfalls ignoriert.

# --- OSC-Ziel ---
OscTargetIp  = 192.168.179.17
OscPort      = 39539

# --- AprilTag ---
# Physische Kantenlänge des gedruckten Markers in Metern (z.B. 0.05 = 50 mm)
TagSizeMeters = 0.05

# --- Kamera ---
CameraIndex  = 0        # 0 = erste verfügbare Kamera
CameraWidth  = 640
CameraHeight = 480
CameraFps    = 30

# --- Glättung (Exponential Moving Average) ---
# 0.0 = maximale Glättung (viel Lag)   1.0 = kein Smoothing
SmoothAlpha  = 0.35
